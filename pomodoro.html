<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; color: #eee;
    user-select: none;
  }
  .container { text-align: center; }
  .timer {
    font-size: 120px; font-weight: 200; letter-spacing: 8px;
    margin: 20px 0; font-variant-numeric: tabular-nums;
  }
  .label { font-size: 20px; color: #888; margin-bottom: 30px; letter-spacing: 4px; }
  .label.work { color: #e94560; }
  .label.break { color: #0f3460; }
  button {
    font-size: 18px; padding: 12px 40px; margin: 8px;
    border: 2px solid #e94560; background: transparent; color: #e94560;
    border-radius: 30px; cursor: pointer; letter-spacing: 2px;
    transition: all 0.2s;
  }
  button:hover { background: #e94560; color: #fff; }
  button:active { transform: scale(0.96); }
  .sessions { margin-top: 30px; font-size: 14px; color: #555; }
  .sessions span { color: #e94560; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <div class="label" id="label">专注</div>
  <div class="timer" id="timer">25:00</div>
  <div>
    <button id="btn" onclick="toggle()">开始</button>
  </div>
  <div class="sessions">已完成 <span id="count">0</span> 个番茄</div>
</div>

<script>
const WORK = 25 * 60, BREAK = 5 * 60;
let remaining = WORK, isWork = true, running = false, interval, count = 0;

const el = (id) => document.getElementById(id);
const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;

function tick() {
  remaining--;
  el('timer').textContent = fmt(remaining);
  document.title = `${fmt(remaining)} — ${isWork ? '专注' : '休息'}`;
  if (remaining <= 0) switchMode();
}

function switchMode() {
  clearInterval(interval); running = false;
  if (isWork) {
    count++;
    el('count').textContent = count;
  }
  notify(isWork ? '🍅 番茄完成！休息一下吧' : '休息结束，开始新的番茄！');
  isWork = !isWork;
  remaining = isWork ? WORK : BREAK;
  el('timer').textContent = fmt(remaining);
  el('label').textContent = isWork ? '专注' : '休息';
  el('label').className = isWork ? 'label work' : 'label break';
  el('btn').textContent = '开始';
  document.title = '番茄钟';
}

function notify(msg) {
  if (Notification.permission === 'granted') new Notification(msg);
  else if (Notification.permission !== 'denied') Notification.requestPermission();
}

function toggle() {
  if (running) {
    clearInterval(interval); running = false;
    el('btn').textContent = '继续';
  } else {
    if (Notification.permission === 'default') Notification.requestPermission();
    interval = setInterval(tick, 1000);
    running = true;
    el('btn').textContent = '暂停';
  }
}
</script>
</body>
</html>
